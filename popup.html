<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 13px;
      width: 260px;
      padding: 12px;
      color: #1a1a1a;
      background: #fff;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #777;
      margin-bottom: 12px;
    }
    .site-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #ede9f6;
      color: #5a3b9e;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .site-badge.unknown {
      background: #f0f0f0;
      color: #888;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f7f7f7;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    button:hover { background: #ede9f6; border-color: #a084d8; }
    button:active { background: #d9d0f0; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .icon { font-size: 15px; }
    .btn-label { flex: 1; }
    .btn-sub { font-size: 10px; color: #888; display: block; }
    #status {
      font-size: 11px;
      margin-top: 6px;
      min-height: 18px;
      color: #555;
    }
    #status.ok { color: #2a7a2a; }
    #status.err { color: #c0392b; }
    .divider { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    .footer { font-size: 10px; color: #bbb; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>Chat Exporter</h2>
  <div class="subtitle">Exportiere Chats als HTML oder zum Drucken</div>
  <div id="site-badge" class="site-badge unknown">Seite wird erkannt...</div>

  <button id="btn-print">
    <span class="icon">&#128424;</span>
    <span class="btn-label">
      Drucken / PDF
      <span class="btn-sub">Mehrseitig, optimiertes Layout</span>
    </span>
  </button>

  <button id="btn-html">
    <span class="icon">&#128196;</span>
    <span class="btn-label">
      Als HTML exportieren
      <span class="btn-sub">Download + in OneNote importierbar</span>
    </span>
  </button>

  <hr class="divider">
  <div id="status">Bereit.</div>
  <div class="footer">v1.0 &mdash; Chat Exporter</div>

  <script src="popup.js"></script>
</body>
</html>
